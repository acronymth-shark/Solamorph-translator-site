<!DOCTYPE html>
<html>
<head>
    <title>Solara Translator</title>

    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

    <style>
    body {
        background-color: black;
        color: rgb(0, 110, 255);
        font-family: 'Orbitron', sans-serif;
        padding: 20px;
    }

    h2 {
        margin-bottom: 10px;
    }

    textarea {
        background-color: #111;
        color: rgb(0, 110, 255);
        border: 1px solid lime;
        padding: 10px;
    }

    button {
        background-color: lime;
        color: black;
        padding: 10px;
        border: none;
        cursor: pointer;
        margin-top: 10px;
    }
    </style>
</head>

<body>

<h2>Caputformain/Solara Translator</h2>

<textarea id="input" rows="6" cols="50" placeholder="Type in English here..."></textarea>
<br><br>

<button onclick="run()">Translate</button>

<p id="output"></p>

<script>
const translator = {
    "i": "Ani",
    "caputforman": "Morf'ka", // ✅ lowercase + comma added
    "eat": "munz",
    "apple": "sena",
    "you": "teka",
    "hello": "berakhet",
    "hi": "berak",
    "yes": "ya'e",
    "no": "nehk",
    "goodbye": "berakhete",
    "bye": "ete",
    "am": "esu",
    "mother": "Emira",
    "father": "Abvaren",
    "brother": "Brakhun",
    "sister": "Achvela",
    "a": "es",
    "my": "ani'at",
    "name": "canne",
    "is": "esuv",
    "and": "ven",
    "was": "kenet",
    "were": "esnet",
    "be": "esi",
    "been": "esenar",
    "have": "havet",
    "has": "hahj",
    "had": "haver",
    "because": "zihar",
    "but": "enar",
    "he": "hakar",
    "him": "hakor",
    "his": "hakat",
    "she": "sila",
    "her": "silor",
    "hers": "silat",
    "himself": "hakavem",
    "herself": "silavem",
    "they": "dekan",
    "them": "dekor",
    "theirs": "dekat",
    "themself": "dekavem",
    "the": "der",
    "help": "azerra",
    "hate": "haten",
    "not": "net",
    "that": "das",
    "saw": "vis",
    "seen": "vis",
    "see": "visrekh",
    "wolf": "lopon",
    "all": "torak",
    "dance": "tanzen",
    "one": "nu",
    "two": "out",
    "three": "tru",
    "four": "quat",
    "five": "tanu",
    "six": "zef",
    "seven": "zeffen",
    "eight": "ach",
    "nine": "neven",
    "ten": "ba",
    "chapter": "verith"
};

const suffixes = {
    "ing": "ten",
    "ed": "et",
    "s": "ar",
    "'s": "at",
    "self": "vem"
};

const exceptions = {
    "is": "esuv"
};

function translateWord(word) {
    let prefix = "";
    let suffixPunct = "";

    while (word.length > 0 && /[^\w']/.test(word[0])) {
        prefix += word[0];
        word = word.slice(1);
    }

    while (word.length > 0 && /[^\w']/.test(word[word.length - 1])) {
        suffixPunct = word[word.length - 1] + suffixPunct;
        word = word.slice(0, -1);
    }

    let lower = word.toLowerCase();
    let translated = null;

    if (exceptions[lower]) {
        translated = exceptions[lower];
    } else {
        for (let suffix in suffixes) {
            if (lower.endsWith(suffix)) {
                let base = lower.slice(0, -suffix.length);
                if (translator[base]) {
                    translated = translator[base] + suffixes[suffix];
                    break;
                }
            }
        }

        if (!translated) {
            if (translator[lower]) {
                translated = translator[lower];
            } else {
                translated = word;
            }
        }
    }

    return prefix + translated + suffixPunct;
}

function translateSentence(sentence) {
    return sentence.split(" ").map(w => translateWord(w)).join(" ");
}

function run() {
    let input = document.getElementById("input").value;
    document.getElementById("output").innerText = translateSentence(input);
}
</script>

</body>
</html>
